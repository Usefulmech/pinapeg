<style>
        body {
            background-color: #fdf8f6;
            color: #1c1b1a;
            -webkit-font-smoothing: antialiased;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(12px);
            border: 1px solid #cfc5bd;
        }

        .pulse-soft {
            animation: pulse-soft 4s infinite ease-in-out;
        }

        @keyframes pulse-soft {
            0%, 100% { transform: scale(1); opacity: 0.1; }
            50% { transform: scale(1.05); opacity: 0.15; }
        }

        .floating {
            animation: floating 6s infinite ease-in-out;
        }

        @keyframes floating {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
        body {
            min-height: max(884px, 100dvh);
        }

<body class="min-h-screen flex flex-col font-body-md overflow-hidden">
<header class="w-full flex justify-center py-12 px-container-padding">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-primary text-3xl" style="font-variation-settings: 'FILL' 1;">spa</span>
<h1 class="font-headline-md text-headline-md text-primary tracking-tight">Pinapeg</h1>
</div>
</header>
<main class="flex-grow flex flex-col items-center justify-center px-container-padding max-w-2xl mx-auto text-center relative">
<!-- Decorative Background Element -->
<div class="absolute -z-10 w-[500px] h-[500px] bg-primary-fixed-dim rounded-full blur-[100px] opacity-20 pulse-soft"></div>
<!-- Visual Anchor: Conceptual Bento/Glass Element -->
<div class="mb-section-gap w-full flex flex-col items-center">
<div class="flex gap-4 mb-stack-gap floating">
<!-- Representing Gmail -->
<div class="glass-card w-20 h-20 rounded flex items-center justify-center shadow-sm">
<span class="material-symbols-outlined text-primary text-4xl">mail</span>
</div>
<!-- Representing Calendar -->
<div class="glass-card w-20 h-20 rounded flex items-center justify-center shadow-sm translate-y-4">
<span class="material-symbols-outlined text-primary text-4xl">calendar_today</span>
</div>
</div>
</div>
<!-- Content Section -->
<div class="space-y-stack-gap">
<h2 class="font-display-lg-mobile text-display-lg-mobile text-on-background md:font-display-lg md:text-display-lg">
                Connect your world
            </h2>
<p class="font-body-lg text-body-lg text-on-surface-variant max-w-md mx-auto">
                To help you stay on track, we'll need to see your calendar. This allows Pinapeg to prepare for your day ahead of time.
            </p>
</div>
<!-- Action Section -->
<div class="mt-section-gap w-full max-w-sm space-y-4">
<button class="w-full h-touch-target-min flex items-center justify-center gap-3 bg-primary-container text-on-primary-container rounded font-label-md text-label-md hover:bg-primary transition-all shadow-sm" onclick="handleConnect()">
<img alt="Google Logo" class="w-5 h-5" src="https://lh3.googleusercontent.com/aida-public/AB6AXuA85OcpfzgpnP0paf8EVmwMqHK1yg4-OO9NNJinedTNj6sLPv_8Df3-QxVRf7YSCYHyVi2LRi9Qx0l1OqDsuauGc16juZtQ6oJB7kaud1n2rSXRsOQ1RlL9VGS3hFAUYLQ48mhRPWNNOc2L2Xy69OzE8y7mehSdwmx6QdexchuQGo7cgDuyUbyYVF7bMQf3GJPuSolCJQvaHphzkfA3DMkrn9fbn3a8uQEnK3Qwf_bopzR5rZSL4m7RHoQjojFOoC4fXSoOBMdWvwo"/>
                Connect Google
            </button>
<button class="w-full h-touch-target-min text-on-secondary-container font-body-md text-body-md hover:text-primary transition-colors active:scale-[0.98]" onclick="handleSkip()">
                Maybe later
            </button>
</div>
<!-- Contextual Human Note -->
<div class="mt-12 flex items-center gap-2 text-outline">
<span class="material-symbols-outlined text-sm">lock</span>
<span class="text-label-sm font-label-sm uppercase tracking-wider">Your data remains private &amp; encrypted</span>
</div>
</main>
<!-- Bottom Aesthetic Detail -->
<footer class="py-12 flex justify-center">
<div class="flex gap-2">
<div class="w-2 h-2 rounded-full bg-outline-variant"></div>
<div class="w-2 h-2 rounded-full bg-primary-fixed-dim"></div>
<div class="w-2 h-2 rounded-full bg-outline-variant"></div>
</div>
</footer>
<!-- Animated Backdrop Shader (Subtle Atmosphere) -->
<div class="fixed inset-0 -z-20 pointer-events-none overflow-hidden">
</div>
<script>
        // Micro-interactions
        function handleConnect() {
            const btn = event.currentTarget;
            const originalHTML = btn.innerHTML;
            btn.innerHTML = '<span class="material-symbols-outlined animate-spin text-sm">progress_activity</span> Connecting...';
            btn.classList.add('opacity-80');
            setTimeout(() => {
                alert('In a real app, this would trigger the OAuth flow.');
                btn.innerHTML = originalHTML;
                btn.classList.remove('opacity-80');
            }, 2000);
        }

        function handleSkip() {
            const main = document.querySelector('main');
            main.style.transition = 'all 0.5s ease';
            main.style.opacity = '0';
            main.style.transform = 'translateY(-20px)';
            setTimeout(() => {
                alert('Continuing to the Pinapeg experience...');
                main.style.opacity = '1';
                main.style.transform = 'translateY(0)';
            }, 600);
        }
    </script>
