services:
  - type: web
    name: pinapeg-api
    runtime: python
    rootDir: backend
    plan: free
    region: oregon
    branch: main
    autoDeploy: true
    buildCommand: python -m pip install --upgrade pip && python -m pip install -e .
    startCommand: python -m uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    buildFilter:
      paths:
        - backend/**
        - render.yaml
    envVars:
      - key: APP_ENV
        value: production
      - key: ALLOW_DEV_IDENTITY
        value: "true"
      - key: STORAGE_MODE
        value: postgres
      - key: DATABASE_URL
        sync: false

      - key: CORS_ORIGINS
        value: "https://pinapeg.vercel.app"
      - key: FRONTEND_APP_URL
        value: "https://pinapeg.vercel.app"
      - key: OPENAI_API_KEY
        sync: false
      - key: EMBEDDING_MODEL
        value: text-embedding-3-small
      - key: TRANSCRIPTION_MODEL
        value: whisper-1
      - key: SUMMARY_MODEL
        value: gpt-4o-mini
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_REDIRECT_URI
        sync: false
      - key: GOOGLE_OAUTH_STATE_SECRET
        sync: false
      - key: TOKEN_ENCRYPTION_KEY
        sync: false
      - key: VAPID_PUBLIC_KEY
        sync: false
      - key: VAPID_PRIVATE_KEY
        sync: false

